<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&L</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0d1117;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #pnl {
    font-size: clamp(48px, 18vw, 180px);
    font-weight: 800;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: opacity 0.2s;
  }
  #pnl.loading { opacity: 0.4; }
  .positive { color: #3fb950; }
  .negative { color: #f85149; }
  .neutral { color: #8b949e; }
</style>
</head>
<body>
<div id="pnl" class="neutral">--</div>

<script>
const QTY = 6;
const AVG_FILL = 6.2567;
const STRIKE = 110;
const T = 2 / 252;
const R = 0.05;
const SIGMA = 1.30;
const TICKER = 'SOXL';
const FX_TICKER = 'CAD=X';

function normCDF(x) {
  const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741;
  const a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x) / Math.sqrt(2);
  const t = 1.0 / (1.0 + p * x);
  const y = 1.0 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);
  return 0.5 * (1.0 + sign * y);
}

function bsCall(S, K, T, r, sigma) {
  if (T <= 0 || sigma <= 0) return Math.max(S - K, 0);
  const d1 = (Math.log(S / K) + (r + 0.5 * sigma * sigma) * T) / (sigma * Math.sqrt(T));
  const d2 = d1 - sigma * Math.sqrt(T);
  return S * normCDF(d1) - K * Math.exp(-r * T) * normCDF(d2);
}

const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

async function fetchYahoo(symbol) {
  // Use 5m bars for 5-day range -- this reliably includes pre/post-market
  // sessions in the indicators array. Then find the latest non-null close.
  const yUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=5m&range=5d&includePrePost=true`;
  let lastErr;
  for (const proxy of PROXIES) {
    try {
      const resp = await fetch(proxy(yUrl) + '&_=' + Date.now()); // bust caches
      if (!resp.ok) { lastErr = new Error('HTTP ' + resp.status); continue; }
      const data = await resp.json();
      const result = data?.chart?.result?.[0];
      if (!result) { lastErr = new Error('No result'); continue; }

      const meta = result.meta;
      const closes = result.indicators?.quote?.[0]?.close || [];
      const timestamps = result.timestamp || [];

      // Candidates: latest non-null bar close + all meta fields, pick most recent
      const candidates = [
        [meta.regularMarketTime || 0, meta.regularMarketPrice],
        [meta.postMarketTime || 0, meta.postMarketPrice],
        [meta.preMarketTime || 0, meta.preMarketPrice],
      ].filter(([_, p]) => p && p > 0);

      for (let i = closes.length - 1; i >= 0; i--) {
        if (closes[i] !== null && closes[i] > 0) {
          candidates.push([timestamps[i] || 0, closes[i]]);
          break;
        }
      }

      candidates.sort((a, b) => b[0] - a[0]);
      return candidates[0]?.[1] || meta.regularMarketPrice;
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error('fail');
}

function fmtCad(n) {
  const sign = n >= 0 ? '+' : '-';
  return sign + '$' + Math.abs(n).toLocaleString('en-CA', { maximumFractionDigits: 0 });
}

async function refresh() {
  const el = document.getElementById('pnl');
  el.classList.add('loading');
  try {
    const [price, fx] = await Promise.all([
      fetchYahoo(TICKER),
      fetchYahoo(FX_TICKER),
    ]);
    const C = bsCall(price, STRIKE, T, R, SIGMA);
    const usd = (C - AVG_FILL) * 100 * QTY;
    const cad = usd * fx;
    el.textContent = fmtCad(cad);
    el.className = (usd > 0 ? 'positive' : usd < 0 ? 'negative' : 'neutral');
  } catch (e) {
    el.textContent = 'err';
    el.className = 'neutral';
  } finally {
    el.classList.remove('loading');
  }
}

document.body.addEventListener('click', refresh);
refresh();
</script>
</body>
</html>
