<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&L</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    margin: 0;
    padding: 16px;
    min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding: 0 4px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .header-title { font-size: 14px; color: #8b949e; letter-spacing: 0.5px; }
  .header-meta { font-size: 13px; color: #8b949e; font-variant-numeric: tabular-nums; }
  .header-meta .label { color: #6e7681; }
  .header-meta .val { color: #e6edf3; font-weight: 600; }

  .table-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  th {
    background: #1c2128;
    color: #8b949e;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 10px 8px;
    text-align: right;
    border-bottom: 1px solid #30363d;
  }
  th:first-child { text-align: left; padding-left: 14px; }
  th:last-child { padding-right: 14px; }
  td {
    padding: 8px;
    text-align: right;
    border-bottom: 1px solid #21262d;
  }
  td:first-child { text-align: left; padding-left: 14px; font-weight: 600; color: #c9d1d9; }
  td:last-child { padding-right: 14px; color: #8b949e; }
  tr:last-child td { border-bottom: none; }

  .row-now { background: #1c2738; }
  .row-now td:first-child { color: #58a6ff; }
  .row-now td:first-child::after { content: " ← now"; color: #58a6ff; font-size: 10px; font-weight: 400; }
  .row-be { background: rgba(187, 128, 9, 0.08); }
  .row-be td:first-child::after { content: " ← BE"; color: #d29922; font-size: 10px; font-weight: 400; }
  .row-target { background: rgba(63, 185, 80, 0.04); }

  .positive { color: #3fb950; font-weight: 600; }
  .negative { color: #f85149; font-weight: 600; }
  .neutral { color: #8b949e; }

  button {
    background: #238636;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }
  button:hover:not(:disabled) { background: #2ea043; }
  button:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }

  details { margin-top: 14px; color: #6e7681; font-size: 12px; }
  details summary {
    cursor: pointer;
    padding: 8px 4px;
    user-select: none;
  }
  details summary:hover { color: #8b949e; }
  .iv-control { padding: 8px 4px 0; }
  .iv-control input[type="range"] { width: 100%; margin-top: 6px; accent-color: #58a6ff; }
  .iv-value { color: #58a6ff; font-weight: 600; }
  .iv-control select {
    width: 100%; padding: 6px; background: #0d1117; color: #e6edf3;
    border: 1px solid #30363d; border-radius: 6px; margin-top: 6px;
  }

  .error-box {
    color: #f85149;
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid #f85149;
    padding: 10px 12px;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 12px;
  }
  .footnote {
    color: #6e7681;
    font-size: 11px;
    margin-top: 10px;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-title">EXIT P&amp;L SCENARIOS</div>
    <div class="header-meta">
      <span class="label">Now:</span>
      <span class="val" id="hdr-stock">--</span>
      <span class="label" style="margin-left:10px">FX:</span>
      <span class="val" id="hdr-fx">--</span>
    </div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Close</th>
          <th>Opt</th>
          <th>P&amp;L USD</th>
          <th>P&amp;L CAD</th>
          <th>Return</th>
          <th>$/+1</th>
        </tr>
      </thead>
      <tbody id="scenarios"></tbody>
    </table>
  </div>

  <button id="refresh-btn">Refresh</button>

  <details>
    <summary>Settings</summary>
    <div class="iv-control">
      <label>IV: <span id="iv-value" class="iv-value">130%</span></label>
      <input type="range" id="iv-slider" min="50" max="300" value="130" step="5">
    </div>
    <div class="iv-control" style="margin-top: 10px;">
      <label>Exit time: <span class="iv-value" id="exit-mode-label">Wed 3:50 PM</span></label>
      <select id="exit-mode">
        <option value="wed">Wed 3:50 PM (sell day)</option>
        <option value="now">Right now (live mark)</option>
        <option value="exp">At expiry (Fri 4:00 PM)</option>
      </select>
    </div>
  </details>

  <div id="error-container"></div>

  <p class="footnote">
    BS estimate, constant IV. Real bid/ask differs.<br>
    <span style="color:#58a6ff">current</span> &middot; <span style="color:#d29922">breakeven</span> &middot; <span style="color:#3fb950">analogue target</span>
  </p>
</div>

<script>
const QTY = 6;
const AVG_FILL = 6.2567;
const TOTAL_COST_USD = QTY * AVG_FILL * 100;
const STRIKE = 110;
const EXPIRY_ISO = '2026-05-01T20:00:00Z';
const R = 0.05;
const TICKER = 'SOXL';
const FX_TICKER = 'CAD=X';
const ANALOGUE_LO = 127, ANALOGUE_HI = 128;

let SIGMA = 1.30;
let CURRENT_STOCK = null;
let CURRENT_FX = 1.37;
let EXIT_MODE = 'wed';

function normCDF(x) {
  const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741;
  const a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x) / Math.sqrt(2);
  const t = 1.0 / (1.0 + p * x);
  const y = 1.0 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);
  return 0.5 * (1.0 + sign * y);
}

function bsCall(S, K, T, r, sigma) {
  if (T <= 0 || sigma <= 0) return Math.max(S - K, 0);
  const d1 = (Math.log(S / K) + (r + 0.5 * sigma * sigma) * T) / (sigma * Math.sqrt(T));
  const d2 = d1 - sigma * Math.sqrt(T);
  return S * normCDF(d1) - K * Math.exp(-r * T) * normCDF(d2);
}

function getExitT() {
  if (EXIT_MODE === 'exp') return 0;
  if (EXIT_MODE === 'now') {
    const ms = new Date(EXPIRY_ISO) - new Date();
    return ms <= 0 ? 0 : ms / (365 * 24 * 3600 * 1000);
  }
  return 2 / 252;
}

const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

async function fetchYahoo(symbol) {
  const yUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1m&range=1d`;
  let lastErr;
  for (const proxy of PROXIES) {
    try {
      const resp = await fetch(proxy(yUrl));
      if (!resp.ok) { lastErr = new Error(`HTTP ${resp.status}`); continue; }
      const data = await resp.json();
      const meta = data?.chart?.result?.[0]?.meta;
      if (!meta) { lastErr = new Error('No data'); continue; }
      return meta.regularMarketPrice;
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error('All proxies failed');
}

function fmtUsd(n) {
  const sign = n >= 0 ? '+' : '-';
  const abs = Math.abs(n).toLocaleString('en-US', { maximumFractionDigits: 0 });
  return `${sign}$${abs}`;
}
function fmtCad(n) {
  const sign = n >= 0 ? '+' : '-';
  const abs = Math.abs(n).toLocaleString('en-CA', { maximumFractionDigits: 0 });
  return `${sign}$${abs}`;
}

function renderTable() {
  const tbody = document.getElementById('scenarios');
  while (tbody.firstChild) tbody.removeChild(tbody.firstChild);

  const T = getExitT();
  const lo = 105, hi = 140;
  const nowPrice = CURRENT_STOCK ? Math.round(CURRENT_STOCK) : null;

  let breakeven = null;
  for (let p = lo; p <= hi; p++) {
    const opt = bsCall(p, STRIKE, T, R, SIGMA);
    const pnl = (opt - AVG_FILL) * 100 * QTY;
    if (pnl >= 0) { breakeven = p; break; }
  }

  for (let p = lo; p <= hi; p++) {
    const opt = Math.max(bsCall(p, STRIKE, T, R, SIGMA), 0.01);
    const perPnl = (opt - AVG_FILL) * 100;
    const totalUsd = perPnl * QTY;
    const totalCad = totalUsd * CURRENT_FX;
    const ret = totalUsd / TOTAL_COST_USD * 100;

    let prevOpt = (p > lo) ? bsCall(p - 1, STRIKE, T, R, SIGMA) : null;
    let dollarPerOne = prevOpt !== null ? ((opt - Math.max(prevOpt, 0.01)) * 100 * QTY) : null;

    const tr = document.createElement('tr');
    if (nowPrice !== null && p === nowPrice) tr.classList.add('row-now');
    if (p === breakeven) tr.classList.add('row-be');
    if (p >= ANALOGUE_LO && p <= ANALOGUE_HI) tr.classList.add('row-target');

    const cls = totalUsd > 0 ? 'positive' : (totalUsd < 0 ? 'negative' : 'neutral');

    const cells = [
      { text: `$${p}`, cls: null },
      { text: `$${opt.toFixed(2)}`, cls: null },
      { text: fmtUsd(totalUsd), cls },
      { text: fmtCad(totalCad), cls },
      { text: `${ret >= 0 ? '+' : ''}${ret.toFixed(0)}%`, cls },
      { text: dollarPerOne === null ? '—' : `+$${Math.round(dollarPerOne)}`, cls: null },
    ];

    cells.forEach(c => {
      const td = document.createElement('td');
      td.textContent = c.text;
      if (c.cls) td.className = c.cls;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }
}

function showError(msg) {
  const container = document.getElementById('error-container');
  while (container.firstChild) container.removeChild(container.firstChild);
  const box = document.createElement('div');
  box.className = 'error-box';
  box.textContent = `Failed to fetch: ${msg}. Try again in 10 sec.`;
  container.appendChild(box);
}

function clearError() {
  const container = document.getElementById('error-container');
  while (container.firstChild) container.removeChild(container.firstChild);
}

async function refresh() {
  const btn = document.getElementById('refresh-btn');
  clearError();
  btn.disabled = true;
  btn.textContent = 'Loading...';

  try {
    const [price, fx] = await Promise.all([
      fetchYahoo(TICKER),
      fetchYahoo(FX_TICKER),
    ]);
    CURRENT_STOCK = price;
    CURRENT_FX = fx;

    document.getElementById('hdr-stock').textContent = `$${price.toFixed(2)}`;
    document.getElementById('hdr-fx').textContent = fx.toFixed(4);
    renderTable();
  } catch (e) {
    showError(e.message || String(e));
  } finally {
    btn.disabled = false;
    btn.textContent = 'Refresh';
  }
}

document.getElementById('iv-slider').addEventListener('input', (e) => {
  SIGMA = e.target.value / 100;
  document.getElementById('iv-value').textContent = `${e.target.value}%`;
  if (CURRENT_STOCK !== null) renderTable();
});

document.getElementById('exit-mode').addEventListener('change', (e) => {
  EXIT_MODE = e.target.value;
  const labels = { wed: 'Wed 3:50 PM', now: 'Right now', exp: 'At expiry' };
  document.getElementById('exit-mode-label').textContent = labels[EXIT_MODE];
  if (CURRENT_STOCK !== null) renderTable();
});

document.getElementById('refresh-btn').addEventListener('click', refresh);
refresh();
</script>
</body>
</html>
