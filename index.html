<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&L</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container { max-width: 480px; width: 100%; }

  .pnl-card {
    background: linear-gradient(135deg, #161b22 0%, #1c2128 100%);
    border: 1px solid #30363d;
    border-radius: 14px;
    padding: 44px 24px;
    margin-bottom: 14px;
    text-align: center;
  }
  .pnl-cad {
    font-size: 64px;
    font-weight: 700;
    margin: 0 0 8px 0;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .pnl-usd {
    font-size: 16px;
    color: #8b949e;
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }
  .return-pct {
    font-size: 22px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .positive { color: #3fb950; }
  .negative { color: #f85149; }
  .neutral { color: #8b949e; }

  .updated {
    color: #6e7681;
    font-size: 11px;
    margin-top: 18px;
    letter-spacing: 0.3px;
  }

  button {
    background: #238636;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }
  button:hover:not(:disabled) { background: #2ea043; }
  button:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }

  details {
    margin-top: 14px;
    color: #6e7681;
    font-size: 12px;
  }
  details summary {
    cursor: pointer;
    padding: 8px 0;
    user-select: none;
  }
  details summary:hover { color: #8b949e; }
  .iv-control { padding: 8px 4px 0; }
  .iv-control input[type="range"] { width: 100%; margin-top: 6px; accent-color: #58a6ff; }
  .iv-value { color: #58a6ff; font-weight: 600; }

  .error-box {
    color: #f85149;
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid #f85149;
    padding: 10px 12px;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="pnl-card">
    <div id="pnl-cad" class="pnl-cad neutral">--</div>
    <div id="pnl-usd" class="pnl-usd">--</div>
    <div id="return-pct" class="return-pct neutral">--</div>
    <div id="updated" class="updated">Tap to load</div>
  </div>

  <button id="refresh-btn">Refresh</button>

  <details>
    <summary>Settings</summary>
    <div class="iv-control">
      <label>IV: <span id="iv-value" class="iv-value">130%</span></label>
      <input type="range" id="iv-slider" min="50" max="300" value="130" step="5">
    </div>
  </details>

  <div id="error-container"></div>
</div>

<script>
const QTY = 6;
const AVG_FILL = 6.2567;
const TOTAL_COST_USD = QTY * AVG_FILL * 100;
const STRIKE = 110;
const EXPIRY_ISO = '2026-05-01T20:00:00Z';
const R = 0.05;
const TICKER = 'SOXL';
const FX_TICKER = 'CAD=X';

let SIGMA = 1.30;

function normCDF(x) {
  const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741;
  const a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x) / Math.sqrt(2);
  const t = 1.0 / (1.0 + p * x);
  const y = 1.0 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);
  return 0.5 * (1.0 + sign * y);
}

function bsCall(S, K, T, r, sigma) {
  if (T <= 0 || sigma <= 0) return Math.max(S - K, 0);
  const d1 = (Math.log(S / K) + (r + 0.5 * sigma * sigma) * T) / (sigma * Math.sqrt(T));
  const d2 = d1 - sigma * Math.sqrt(T);
  return S * normCDF(d1) - K * Math.exp(-r * T) * normCDF(d2);
}

function timeToExpiryYears() {
  const ms = new Date(EXPIRY_ISO) - new Date();
  return ms <= 0 ? 0 : ms / (365 * 24 * 3600 * 1000);
}

const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

async function fetchYahoo(symbol) {
  const yUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1m&range=1d`;
  let lastErr;
  for (const proxy of PROXIES) {
    try {
      const resp = await fetch(proxy(yUrl));
      if (!resp.ok) { lastErr = new Error(`HTTP ${resp.status}`); continue; }
      const data = await resp.json();
      const meta = data?.chart?.result?.[0]?.meta;
      if (!meta) { lastErr = new Error('No data'); continue; }
      return meta.regularMarketPrice;
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error('All proxies failed');
}

function fmtMoney(n, currency) {
  const sign = n >= 0 ? '+' : '-';
  const abs = Math.abs(n).toLocaleString(currency === 'CAD' ? 'en-CA' : 'en-US', {
    maximumFractionDigits: 0
  });
  return `${sign}$${abs}`;
}

function showError(msg) {
  const container = document.getElementById('error-container');
  while (container.firstChild) container.removeChild(container.firstChild);
  const box = document.createElement('div');
  box.className = 'error-box';
  box.textContent = `Failed to fetch: ${msg}. Try again in 10 sec.`;
  container.appendChild(box);
}

function clearError() {
  const container = document.getElementById('error-container');
  while (container.firstChild) container.removeChild(container.firstChild);
}

async function refresh() {
  const btn = document.getElementById('refresh-btn');
  clearError();
  btn.disabled = true;
  btn.textContent = 'Loading...';

  try {
    const [price, fx] = await Promise.all([
      fetchYahoo(TICKER),
      fetchYahoo(FX_TICKER),
    ]);

    const T = timeToExpiryYears();
    const optMid = bsCall(price, STRIKE, T, R, SIGMA);
    const perPnl = (optMid - AVG_FILL) * 100;
    const totalUsd = perPnl * QTY;
    const totalCad = totalUsd * fx;
    const ret = totalUsd / TOTAL_COST_USD * 100;

    const cadEl = document.getElementById('pnl-cad');
    const usdEl = document.getElementById('pnl-usd');
    const retEl = document.getElementById('return-pct');
    const cls = totalUsd > 0 ? 'positive' : (totalUsd < 0 ? 'negative' : 'neutral');
    cadEl.className = `pnl-cad ${cls}`;
    retEl.className = `return-pct ${cls}`;
    cadEl.textContent = fmtMoney(totalCad, 'CAD');
    usdEl.textContent = `${fmtMoney(totalUsd, 'USD')} USD`;
    retEl.textContent = `${ret >= 0 ? '+' : ''}${ret.toFixed(1)}%`;

    document.getElementById('updated').textContent =
      `Updated ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    showError(e.message || String(e));
  } finally {
    btn.disabled = false;
    btn.textContent = 'Refresh';
  }
}

const slider = document.getElementById('iv-slider');
const ivValue = document.getElementById('iv-value');
slider.addEventListener('input', () => {
  SIGMA = slider.value / 100;
  ivValue.textContent = `${slider.value}%`;
  if (document.getElementById('pnl-cad').textContent !== '--') refresh();
});

document.getElementById('refresh-btn').addEventListener('click', refresh);
refresh();
</script>
</body>
</html>
